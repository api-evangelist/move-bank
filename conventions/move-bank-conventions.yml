  schema: ResponseErrorListV2
  format: not-rfc9457
  fields: ['errors[].code', 'errors[].title', 'errors[].detail', 'errors[].meta']
  code_scheme: urn:au-cds:error:cds-all:*
  description: >
    Errors return a ResponseErrorListV2 body — an errors[] array where each entry
    carries a URN code (e.g. urn:au-cds:error:cds-all:Header/UnsupportedVersion),
