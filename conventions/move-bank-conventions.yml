versioning:
  style: header
  request_headers: [x-v, x-min-v]
  response_header: x-v
  description: >
    Endpoint versions are negotiated per request via the x-v header (the maximum
    version the client supports) and optional x-min-v (the minimum acceptable).
    The server responds with the version served in the x-v response header, or
    406 Unsupported Version when it cannot satisfy the range. Get Products
    currently supports only v4.
  ref: lifecycle/move-bank-lifecycle.yml
idempotency:
  supported: false
  reason: >
    The published MOVE Bank surface is read-only (HTTP GET, plus CDS bulk POST
    lookups that are non-mutating). There is no create/update/delete contract, so
    no Idempotency-Key mechanism applies.
pagination:
  style: page-number
  request_params: [page, page-size]
  page_size_default: 25
  page_size_max: 1000
  response_fields:
    links: [self, first, prev, next, last]
    meta: [totalRecords, totalPages]
  schemas: [LinksPaginated, MetaPaginated]
  description: >
    Collection endpoints page via page (1-based) and page-size query params,
    returning LinksPaginated (self/first/prev/next/last) and MetaPaginated
    (totalRecords, totalPages). An out-of-range page yields 422 Invalid Page.
request_tracing:
  header: x-fapi-interaction-id
  description: >
    CDS uses the FAPI interaction id for tracing: clients may send
    x-fapi-interaction-id and the server echoes it on the response (a new one is
    generated when absent). Related FAPI headers on the authenticated surface:
    x-fapi-auth-date, x-fapi-customer-ip-address, x-cds-client-headers.
field_selection:
  supported: false
  note: CDS returns fixed resource representations; no sparse-fieldset/expand params.
error_envelope:
