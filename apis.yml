name: MOVE Bank
kind: company
description: MOVE Bank is a 100% customer-owned Australian mutual bank operated by MoveBank
  Ltd (ABN 91 087 651 090, AFSL/Australian credit licence 234 536), headquartered in
  Brisbane, Queensland. Founded in 1968 as Railways Credit Union to serve railway workers
  and their families, it rebranded to MOVE Bank in 2018 to serve the broader transport
  and logistics community nationally, and today manages more than $750 million in assets
  across transaction and savings accounts, term deposits, home and personal loans, and
  insurance. As an authorised deposit-taking institution, MOVE Bank participates in
  Australia's Consumer Data Right (CDR / Open Banking) as a data holder, exposing a
  public, unauthenticated Product Reference Data (PRD) API conforming to the Data Standards
  Body's Consumer Data Standards, alongside the accredited, consent-based consumer data
  sharing surface governed by the CDR security profile.
