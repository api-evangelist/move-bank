apis:
- aid: move-bank:move-bank-cdr-product-reference-data-api
  name: MOVE Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.movebank.com.au/about-us/corporate-information/open-banking/
  baseURL: https://openbanking.movebank.com.au/OpenBanking/cds-au/v1/banking/products
  properties:
  - url: https://openbanking.movebank.com.au/OpenBanking
    type: Documentation
  - url: https://www.movebank.com.au/about-us/corporate-information/open-banking/
    type: APIReference
  - url: openapi/move-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API exposing MOVE Bank's banking product catalogue (home loans, personal loans,
    transaction and savings accounts, term deposits, and card facilities) under the
    standard CDS path /cds-au/v1/banking/products. Confirmed live (HTTP 200, x-v 4)
    at https://openbanking.movebank.com.au/OpenBanking/cds-au/v1/banking/products,
    returning a data.products array and CDS-compliant error envelopes. Covers the
    Get Products and Get Product Detail operations. Conforms to the Data Standards
    Body Consumer Data Standards banking APIs (shared standard, not a bank-proprietary
    contract).
- aid: move-bank:move-bank-cdr-accounts-balances-api
  name: MOVE Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.movebank.com.au/about-us/corporate-information/open-banking/
  baseURL: https://openbanking.movebank.com.au/OpenBanking/cds-au/v1/banking/accounts
  properties:
  - url: https://www.movebank.com.au/about-us/corporate-information/open-banking/
    type: APIReference
  - url: openapi/move-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right banking API for retrieving a
    consented customer's accounts and balances, covering Get Accounts, Get Account
    Detail, Get Bulk Balances, and Get Account Balance under the CDS paths
    /cds-au/v1/banking/accounts, /accounts/{accountId}, /accounts/balances, and
    /accounts/{accountId}/balance. Access requires the CDR consent, OAuth2/OIDC
    authorization and MTLS holder-of-key security profile via an accredited data
    recipient (ADR) — this is not public. The unauthenticated base path returned
    HTTP 401 on probe (2026-07-21), confirming the live authorized surface. Conforms
    to the Data Standards Body Consumer Data Standards banking APIs (shared standard,
    not a bank-proprietary contract).
